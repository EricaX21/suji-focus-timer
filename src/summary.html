<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>溯迹 · 今日总结</title>
  <style>
    :root {
      --bistre: #37241F; --bistre2: #2a1b16; --bistre-line: #4a342b;
      --cocoa: #DF6F21; --cocoa-soft: #f0a25a; --persian: #D38D4F;
      --navajo: #FDDDAA; --khaki: #C2A489;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, "Segoe UI", "Microsoft YaHei", sans-serif;
      background: linear-gradient(160deg, var(--bistre), var(--bistre2));
      color: var(--navajo);
      -webkit-user-select: none; user-select: none;
      display: flex; flex-direction: column;
      overflow-x: hidden; overflow-y: auto;
    }
    /* 自定义滚动条（去网页默认灰条；Phase D 会抽成公共规范） */
    ::-webkit-scrollbar { width: 9px; height: 9px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(223,111,33,.32); border-radius: 6px; border: 2px solid transparent; background-clip: content-box; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(223,111,33,.55); background-clip: content-box; }

    #wrap {
      flex: 1 0 auto;
      display: flex; flex-direction: column; align-items: center;
      text-align: center;
      padding: 26px 26px 22px;
    }
    .ce-emoji { font-size: 52px; line-height: 1; margin-bottom: 10px; }
    .ce-title { font-size: 23px; font-weight: 800; color: var(--navajo); margin-bottom: 5px; }
    .ce-sub { font-size: 12.5px; color: var(--khaki); margin-bottom: 18px; line-height: 1.5; }

    .ce-stats { width: 100%; display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
    .ce-row {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 13px; padding: 10px 14px; border-radius: 9px;
      background: rgba(253,221,170,.06);
    }
    .ce-row .k { color: var(--khaki); }
    .ce-row .v { color: var(--navajo); font-weight: 700; font-variant-numeric: tabular-nums; }
    .ce-row .v.gold { color: #f0c850; }

    .ce-reward {
      width: 100%; font-size: 13.5px; color: #f0c850; font-weight: 700;
      margin-bottom: 20px; min-height: 1em; line-height: 1.5;
    }
    .ce-reward:empty { display: none; }

    #ce-close {
      margin-top: auto;
      padding: 12px 36px; border-radius: 10px; border: none; cursor: pointer;
      background: linear-gradient(135deg, var(--cocoa-soft), var(--cocoa));
      color: var(--bistre); font-weight: 800; font-size: 14.5px;
      box-shadow: 0 4px 14px rgba(223,111,33,.45);
    }
    #ce-close:hover { filter: brightness(1.06); }
    #ce-close:active { transform: scale(0.98); }

    #confetti { position: fixed; inset: 0; pointer-events: none; z-index: 5; }
  </style>
</head>
<body>
  <canvas id="confetti"></canvas>
  <div id="wrap">
    <div class="ce-emoji" id="ce-emoji">🌙</div>
    <div class="ce-title" id="ce-title">今天收工啦</div>
    <div class="ce-sub" id="ce-sub"></div>
    <div class="ce-stats" id="ce-stats"></div>
    <div class="ce-reward" id="ce-reward"></div>
    <button id="ce-close">好的</button>
  </div>
  <script src="summary.js"></script>
</body>
</html>
